version: "3.8"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spotify_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d # auto-runs schema.sql on first boot
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Minimal Airflow standalone for local testing.
  # For production, use the official multi-container Airflow compose file instead.
  airflow:
    image: apache/airflow:2.9.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/spotify_db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/spotify_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags # spotify_dag.py lives here
      - ./src:/opt/airflow/project/src # DAG imports from src.extract, src.transform, etc.
      - ./data:/opt/airflow/project/data # data/raw + data/processed, shared with src/config.py
    ports:
      - "8080:8080"
    command: standalone

volumes:
  pgdata:
